<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gestión de Procesos · SIG HSEQ Colombia · LPS Grupo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{--navy:#0A2540;--navy2:#0F3A63;--blue:#1598FF;--blue-dk:#0B6FCC;--sky:#EAF5FF;--orange:#F5821F;--green:#1E9E5A;--slate:#5B6B7C;--line:#E3E9F0;--ok:#16A34A;--warn:#D97706;--danger:#DC2626;--r:14px;--sh:0 6px 20px rgba(10,37,64,.08);}
*{box-sizing:border-box;}html,body{margin:0;background:#F6F8FB;color:#0F1B2A;font-family:'Inter',-apple-system,sans-serif;}
h1,h2,h3,h4{font-family:'Space Grotesk','Inter',sans-serif;margin:0;letter-spacing:-.01em;}
button{font-family:inherit;cursor:pointer;}a{color:inherit;text-decoration:none;}

/* ===== LAYOUT ===== */
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh;}
.sidebar{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;padding:0;overflow-y:auto;position:relative;}
.sidebar::before{content:'';position:absolute;inset:0;opacity:.1;pointer-events:none;background:repeating-linear-gradient(115deg,rgba(255,255,255,.4) 0 1px,transparent 1px 46px);}
.sb-top{padding:20px 18px 14px;position:relative;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-top .logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sb-top .logo-box{width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;padding:5px;}
.sb-top .logo-box img{width:100%;height:100%;object-fit:contain;}
.sb-top .brand{font-weight:700;font-size:14px;}
.sb-top .brand-sub{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#9FC1E0;margin-top:2px;}
.sb-back{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#9FC1E0;padding:6px 10px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:transparent;width:100%;}
.sb-back:hover{background:rgba(255,255,255,.08);color:#fff;}

.sb-group{padding:14px 0 0;position:relative;}
.sb-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:#7FA5C9;padding:0 18px;margin-bottom:6px;}
.sb-item{width:100%;display:flex;align-items:center;gap:10px;text-align:left;padding:9px 18px;border:none;background:transparent;color:#CFE0F0;font-size:12.5px;font-weight:600;transition:.12s;position:relative;}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{background:var(--blue);color:#fff;}
.sb-item .ic{width:18px;text-align:center;font-size:14px;}
.sb-item .nm{flex:1;line-height:1.3;}
.sb-item .cnt{font-size:10px;background:rgba(255,255,255,.15);padding:1px 7px;border-radius:10px;}

.sb-nivel{margin-bottom:4px;}
.sb-nivel-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:8.5px;font-weight:800;letter-spacing:.06em;margin:0 18px 4px;}
.sb-nivel-tag.n1{background:rgba(29,99,201,.7);color:#D6E8FC;}
.sb-nivel-tag.n2{background:rgba(30,158,90,.7);color:#D0F2E0;}
.sb-nivel-tag.n3{background:rgba(245,130,31,.7);color:#FFEDD5;}

/* ===== MAIN ===== */
.main{padding:24px 30px;overflow-y:auto;}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.eyebrow{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);font-weight:700;}
.page-title{font-size:24px;margin-top:4px;color:var(--navy);}
.page-sub{color:var(--slate);font-size:13px;margin-top:4px;max-width:560px;}

/* ===== TABS ===== */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;}
.tab{border:none;background:transparent;padding:10px 18px;font-size:13px;font-weight:600;color:var(--slate);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;}
.tab:hover{color:var(--blue);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-view{display:none;animation:fadeV .25s ease;}
.tab-view.active{display:block;}
@keyframes fadeV{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ===== CARDS ===== */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border-left:4px solid var(--blue);}
.kpi.c2{border-left-color:var(--green);}.kpi.c3{border-left-color:var(--orange);}.kpi.c4{border-left-color:var(--danger);}
.kpi .kl{font-size:10px;color:var(--slate);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.kpi .kv{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--navy);margin-top:3px;}
.kpi .ks{font-size:10.5px;color:var(--slate);margin-top:2px;}

.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:16px;}
.panel h4{font-size:14px;margin-bottom:2px;}
.panel .ps{font-size:11.5px;color:var(--slate);margin-bottom:12px;}

table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);border-bottom:1px solid var(--line);padding:8px;background:var(--sky);}
tbody td{padding:10px 8px;border-bottom:1px solid var(--line);}
tbody tr:hover{background:var(--sky);}
.badge{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;}
.badge.ok{background:#E4F7EA;color:var(--ok);}.badge.blue{background:var(--sky);color:var(--blue);}.badge.warn{background:#FEF3E0;color:var(--warn);}.badge.gray{background:#EEF1F5;color:var(--slate);}.badge.danger{background:#FBE7E7;color:var(--danger);}

.btn{border:none;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(21,152,255,.3);}.btn-p:hover{background:var(--blue-dk);}
.btn-g{background:#fff;border:1px solid var(--line);color:var(--navy);}.btn-g:hover{border-color:var(--blue);color:var(--blue);}
.row-btn{border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11px;padding:4px 8px;border-radius:6px;margin-left:2px;}
.row-btn:hover{border-color:var(--blue);background:var(--sky);}

/* Forms */
.fg{display:grid;gap:10px;margin-bottom:12px;}
.fg.c4{grid-template-columns:repeat(4,1fr);}
.fg.c3{grid-template-columns:repeat(3,1fr);}
.fg.c2{grid-template-columns:1fr 1fr;}
.fg.c1{grid-template-columns:1fr;}
label{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:3px;}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:inherit;background:#fff;}
textarea{resize:vertical;min-height:50px;}

.progress{height:8px;background:var(--sky);border-radius:8px;overflow:hidden;margin-top:8px;}
.progress>div{height:100%;border-radius:8px;}

.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.chart-box{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh);}
.chart-box h4{font-size:12px;margin-bottom:2px;}
.chart-box .cs{font-size:10px;color:var(--slate);margin-bottom:10px;}

.empty{text-align:center;padding:40px 20px;color:var(--slate);}
.empty .eic{font-size:30px;margin-bottom:8px;}

@media(max-width:900px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.kpi-row{grid-template-columns:1fr 1fr;}.chart-grid{grid-template-columns:1fr;}.fg.c4,.fg.c3{grid-template-columns:1fr 1fr;}}
</style>

<div class="app">

<aside class="sidebar">
  <div class="sb-top">
    <div class="logo">
      <div class="logo-box"><img src="logo-lps.png" alt="LPS"></div>
      <div><div class="brand">Gestión de Procesos</div><div class="brand-sub">SIG HSEQ Colombia</div></div>

<div class="main" id="mainArea">
  <div class="page-head">

      <div class="eyebrow" id="crumb">Sistema de Gestión · LPS Grupo</div>
      <h1 class="page-title" id="pTitle">Seleccione un proceso</h1>

    </div>

    <div class="empty"><div class="eic">🧭</div>Seleccione un proceso del panel izquierdo para comenzar.</div>

<script>

/* =========================================================
   GESTIÓN DE PROCESOS — SUPABASE INTEGRATION
========================================================= */
const NIVELES = [
  {id:'n1',tag:'NIVEL 1',label:'Gerenciales / Estratégicos',cls:'n1',color:'#1D63C9',
    procesos:['direccion-estrategica','planeacion-control','gestion-riesgos','alianzas-corporativas']},
  {id:'n2',tag:'NIVEL 2',label:'Misionales',cls:'n2',color:'#1E9E5A',
    procesos:['gestion-comercial','diseno-soluciones','ejecucion-proyectos','entrega-valor','fidelizacion']},
  {id:'n3',tag:'NIVEL 3',label:'Operativos / de Soporte',cls:'n3',color:'#F5821F',
    procesos:['talento-humano','financiera','compras','tic','documental','legal-cumplimiento','sig']}
];
const TIPOS_DOC = ['Procedimiento','Formato','Manual','Instructivo','Política','Registro','Plan','Programa'];

let allProcesos = {};
let currentProcess = null;
let editingDocIdx = null;
let editingIndIdx = null;
let ch1, ch2;

async function loadProcesos(){
  const rows = await db.getAll('procesos','nivel');
  rows.forEach(r=>{ allProcesos[r.id] = r; });
}

async function getDocCount(pid){
  return await db.count('documentos_proceso',{proceso_id:pid});
}

/* ========== SIDEBAR ========== */
let docCounts={};
async function loadDocCounts(){
  try{
    if(!dbOnline)return;
    const{data}=await getSupabase().from('documentos_proceso').select('proceso_id');
    docCounts={};
    (data||[]).forEach(d=>{docCounts[d.proceso_id]=(docCounts[d.proceso_id]||0)+1;});
  }catch(e){}
}
function renderSidebar(){
  let h='';
  for(const n of NIVELES){
    h+=`<div class="sb-group"><div class="sb-nivel"><span class="sb-nivel-tag ${n.cls}">${n.tag}</span></div><div class="sb-label">${n.label}</div>`;
    for(const pid of n.procesos){
      const p=allProcesos[pid];
      if(!p)continue;
      h+=`<button class="sb-item ${currentProcess===pid?'active':''}" onclick="selectProcess('${pid}')"><span class="ic">${p.icono||'📄'}</span><span class="nm">${p.nombre}</span><span class="cnt">${docCounts[pid]||0}</span></button>`;
    }
    h+=`</div>`;
  }
  document.getElementById('sidebarNav').innerHTML=h;
}

/* ========== PROCESS VIEW ========== */
function findNivel(pid){
  for(const n of NIVELES) if(n.procesos.includes(pid)) return n;
  return NIVELES[0];
}

async function selectProcess(pid){
  currentProcess=pid;
  const p=allProcesos[pid];
  if(!p)return;
  const nivel=findNivel(pid);
  await renderSidebar();

  document.getElementById('crumb').textContent=nivel.tag+' · '+nivel.label;
  document.getElementById('pTitle').textContent=(p.icono||'')+' '+p.nombre;
  document.getElementById('pSub').textContent=p.descripcion||'';

  let docs=[],inds=[],risks=[],actions=[];
  try{
    if(dbOnline){
      [docs,inds,risks,actions] = await Promise.all([
        db.getFiltered('documentos_proceso',{proceso_id:pid},'nombre'),
        db.getFiltered('indicadores_proceso',{proceso_id:pid},'nombre'),
        db.getFiltered('riesgos_proceso',{proceso_id:pid}),
        db.getFiltered('acciones_mejora',{proceso_id:pid})
      ]);
    }
  }catch(e){ console.warn('Error:',e); }

  const vigentes=docs.filter(d=>d.estado==='Vigente').length;
  const enMeta=inds.filter(x=>x.resultado>=x.meta).length;
  const avgRes=inds.length?Math.round(inds.reduce((s,x)=>s+Number(x.resultado),0)/inds.length):0;

  let btnExtra = '';
  if(pid==='talento-humano'){
    btnExtra = '<div style="margin-bottom:16px;"><a href="talento-humano.html" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;background:#1598FF;color:#fff;text-decoration:none;box-shadow:0 4px 14px rgba(21,152,255,.3);">📊 Abrir Fichas de Empleado y Perfil Sociodemográfico</a></div>';
  }
  if(pid==='compras'){
    btnExtra = '<div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;">' +
      '<a href="evaluacion-proveedores.html" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;background:#1598FF;color:#fff;text-decoration:none;box-shadow:0 4px 14px rgba(21,152,255,.3);">✅ Evaluación y Selección de Proveedores</a>' +
      '<a href="registro-proveedor.html" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;background:#F5821F;color:#fff;text-decoration:none;box-shadow:0 4px 14px rgba(245,130,31,.3);">📋 Link Registro de Proveedor</a>' +
    '</div>';
  }

  document.getElementById('processContent').innerHTML=`
    <div class="kpi-row">
      <div class="kpi"><div class="kl">Documentos</div><div class="kv">${docs.length}</div><div class="ks">${vigentes} vigentes</div></div>
      <div class="kpi c2"><div class="kl">Indicadores</div><div class="kv">${inds.length}</div><div class="ks">${enMeta}/${inds.length} en meta</div></div>
      <div class="kpi c3"><div class="kl">Cumplimiento</div><div class="kv">${avgRes}%</div><div class="progress"><div style="width:${avgRes}%;background:${avgRes>=85?'var(--ok)':avgRes>=70?'var(--warn)':'var(--danger)'}"></div></div></div>
      <div class="kpi c4"><div class="kl">Riesgos</div><div class="kv">${risks.length}</div><div class="ks">Identificados</div></div>
    </div>
    ${btnExtra}
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'tab-docs')">📄 Documentos</button>
      <button class="tab" onclick="switchTab(this,'tab-ind')">📊 Indicadores</button>
      <button class="tab" onclick="switchTab(this,'tab-risk')">🛡️ Riesgos</button>
      <button class="tab" onclick="switchTab(this,'tab-actions')">✅ Acciones de Mejora</button>
    </div>
    <div class="tab-view active" id="tab-docs">${renderDocsTab(docs)}</div>
    <div class="tab-view" id="tab-ind">${renderIndTab(inds)}</div>
    <div class="tab-view" id="tab-risk">${renderRiskTab(risks)}</div>
    <div class="tab-view" id="tab-actions">${renderActionsTab(actions)}</div>
    <div class="chart-grid">
      <div class="chart-box"><h4>Indicadores vs. Meta</h4><div class="cs">Resultado vs. meta establecida</div><canvas id="chInd"></canvas></div>
      <div class="chart-box"><h4>Documentos por tipo</h4><div class="cs">Distribución documental</div><canvas id="chDocs"></canvas></div>
    </div>`;
  renderCharts(inds,docs);
}

function switchTab(btn,tabId){
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

/* ========== DOCUMENTOS ========== */
function renderDocsTab(docs){
  const pill=e=>`<span class="badge ${e==='Vigente'?'ok':e==='En revisión'?'warn':'gray'}">${e}</span>`;
  const tipoBadge={'Procedimiento':'#1598FF','Manual':'#6C5CE7','Plan':'#16A34A','Programa':'#059669','Instructivo':'#F5821F','Formato':'#0891B2','Política':'#B45309','Registro':'#475569'};

  const procs=docs.filter(d=>d.tipo==='Procedimiento'||d.tipo==='Manual'||d.tipo==='Plan'||d.tipo==='Programa'||d.tipo==='Instructivo'||d.tipo==='Política').sort((a,b)=>(a.codigo||'').localeCompare(b.codigo||''));
  const formatos=docs.filter(d=>d.tipo==='Formato'||d.tipo==='Registro').sort((a,b)=>(a.codigo||'').localeCompare(b.codigo||''));

  function matchesProc(pc,dc){
    if(!pc||!dc)return false;
    var pb=pc.replace(/^[A-Z]-/,'');
    var db=dc.replace(/^[A-Z]-/,'');
    return db.startsWith(pb)&&dc!==pc;
  }

  var usados=new Set();
  var cards='';
  var num=1;

  procs.forEach(function(proc){
    var color=tipoBadge[proc.tipo]||'#1598FF';
    var asociados=formatos.filter(function(d){return matchesProc(proc.codigo,d.codigo);});
    asociados.forEach(function(d){usados.add(d.id);});
    var hasFile=proc.archivo_url||proc.archivo_nombre;
    var count=asociados.length;

    // Header colapsable
    cards+='<div style="border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;border-left:4px solid '+color+';">';
    cards+='<div onclick="var el=this.nextElementSibling;el.style.display=el.style.display===\'none\'?\'block\':\'none\';this.querySelector(\'.arrow\').textContent=el.style.display===\'none\'?\'▶\':\'▼\';" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:'+color+'06;">';
    cards+='<span class="arrow" style="font-size:10px;color:var(--slate);width:14px;">▶</span>';
    cards+='<span style="font-weight:700;flex:1;">'+num+'. '+proc.nombre+'</span>';
    cards+='<span class="badge" style="background:'+color+'15;color:'+color+';font-size:10px;">'+proc.tipo+'</span>';
    cards+='<span style="font-size:11px;color:var(--slate);font-weight:600;">'+( proc.codigo||'—')+'</span>';
    cards+='<span style="font-size:10px;color:var(--slate);">v'+(proc.version||'1')+'</span>';
    cards+=pill(proc.estado);
    if(hasFile) cards+='<span title="Archivo adjunto" style="color:var(--green);font-size:14px;">✔</span>';
    if(count) cards+='<span style="background:var(--sky);color:var(--blue);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;">'+count+' anexos</span>';
    cards+='</div>';

    // Contenido colapsado
    cards+='<div style="display:none;padding:10px 14px 14px;background:#FAFBFD;">';

    // Fila del procedimiento - archivo
    cards+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:#fff;border:1px solid var(--line);border-radius:8px;">';
    cards+='<span style="font-size:12px;font-weight:600;flex:1;">📄 Archivo del procedimiento</span>';
    if(hasFile) cards+='<span style="color:var(--green);font-weight:700;font-size:12px;">✔ Adjunto</span>';
    cards+='<button class="btn-sm" onclick="uploadFileDoc(\''+proc.id+'\')">📤 Subir</button>';
    cards+='<button class="btn-sm" onclick="linkFileDoc(\''+proc.id+'\')">🔗 Link</button>';
    cards+='<button class="btn-sm" onclick="viewFileDoc(\''+proc.id+'\')">👁 Ver</button>';
    cards+='<button class="btn-sm" onclick="delFileDoc(\''+proc.id+'\')">🗑</button>';

async function uploadFileDoc(docId){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.png,.txt';
  input.onchange=async function(){
    const file=input.files[0];
    if(!file)return;
    if(file.size>4*1024*1024){alert('Máximo 4MB');return;}
    const reader=new FileReader();
    reader.onload=async function(){
      const base64=reader.result.split(',')[1];
      try{
        await getSupabase().from('archivo_documento').insert({
          documento_id:docId,
          nombre_archivo:file.name,
          contenido_base64:base64,
          mime_type:file.type
        });
        alert('✅ Archivo adjuntado: '+file.name);
        await selectProcess(currentProcess);
      }catch(e){alert('Error: '+e.message);}
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

async function linkFileDoc(docId){
  var url=prompt('Pegue el enlace (URL) del archivo:');
  if(!url||!url.trim())return;
  try{
    await getSupabase().from('documentos_proceso').update({archivo_url:url.trim(),archivo_nombre:'🔗 Enlace'}).eq('id',docId);
    alert('✅ Enlace guardado');
    await selectProcess(currentProcess);
  }catch(e){alert('Error: '+e.message);}
}

async function viewFileDoc(docId){
  try{
    // Primero verificar si hay link directo
    var{data:doc}=await getSupabase().from('documentos_proceso').select('archivo_url').eq('id',docId).single();
    if(doc&&doc.archivo_url){window.open(doc.archivo_url,'_blank');return;}
    // Si no, buscar en archivo_documento
    var{data}=await getSupabase().from('archivo_documento').select('*').eq('documento_id',docId).order('created_at',{ascending:false}).limit(1);
    if(!data||!data.length){alert('Sin archivos adjuntos. Use 📤 para subir o 🔗 para agregar enlace.');return;}
    var f=data[0];
    var blob=new Blob([Uint8Array.from(atob(f.contenido_base64),function(c){return c.charCodeAt(0);})],{type:f.mime_type});
    window.open(URL.createObjectURL(blob),'_blank');
  }catch(e){alert('Error: '+e.message);}
}

async function delFileDoc(docId){
  const k=prompt('🔑 Clave para eliminar archivo:');
  if(k!=='LPS-SIG'){if(k!==null)alert('⚠️ Clave incorrecta');return;}
  await getSupabase().from('archivo_documento').delete().eq('documento_id',docId);
  alert('Archivo eliminado');
  await selectProcess(currentProcess);
}

  try {
    if(typeof getSupabase === 'function' && getSupabase()){
      const [procRows] = await Promise.all([db.getAll('procesos','nivel')]);
      if(procRows && procRows.length > 0){
        procRows.forEach(r=>{ allProcesos[r.id] = r; });
        dbOnline = true;
        await loadDocCounts();
      } else { throw new Error('Sin datos'); }
    } else { throw new Error('Supabase no disponible'); }
  } catch(e){
    allProcesos = {...FALLBACK_PROCESOS};
    dbOnline = false;
  }

  renderSidebar();
  const hash=window.location.hash.replace('#','');
  const valid=Object.keys(allProcesos).includes(hash);
  await selectProcess(valid?hash:'direccion-estrategica');
}
init();

</script>
</body>
</html>
